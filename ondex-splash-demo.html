<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ondex — Intro Splash Demo</title>
<style>
  :root {
    --bg: #05060a;
    --ink: #f4f6f8;
    --muted: #8b93a1;
    --accent: #23a7d6;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow-x: hidden;
  }

  #splash {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    transition: transform 0.9s cubic-bezier(.76,0,.24,1);
  }
  #splash.leaving { transform: translateY(-100%); }

  #splash::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(circle at 50% 50%, black 0%, transparent 70%);
    opacity: 0;
    animation: gridIn 1.2s ease forwards 0.15s;
  }
  @keyframes gridIn { to { opacity: 1; } }

  .logo-stage {
    position: relative;
    width: min(78vw, 890px);
    aspect-ratio: 890 / 684;
  }
  .logo-stage img {
    position: absolute;
    top: 0;
    height: 100%;
    width: auto;
    display: block;
  }
  .part-onde {
    left: 0;
    opacity: 0;
    animation: rise 0.7s cubic-bezier(.2,.9,.2,1) forwards 0.25s;
  }
  .part-x {
    left: 678px;
    opacity: 0;
    transform: translate3d(60vw, -55vh, 0) rotate(-22deg) scale(1.5);
    filter: drop-shadow(0 0 0 rgba(35,167,214,0));
    animation:
      slideX 0.85s cubic-bezier(.16,.9,.28,1) forwards 0.55s,
      settle 0.5s ease forwards 1.4s;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideX {
    0%   { opacity: 0; transform: translate3d(60vw, -55vh, 0) rotate(-22deg) scale(1.5); }
    55%  { opacity: 1; }
    100% { opacity: 1; transform: translate3d(0,0,0) rotate(0deg) scale(1);
            filter: drop-shadow(0 0 26px rgba(35,167,214,0.6)); }
  }
  @keyframes settle {
    0%   { filter: drop-shadow(0 0 26px rgba(35,167,214,0.6)); }
    100% { filter: drop-shadow(0 0 0 rgba(35,167,214,0)); }
  }

  .splash-tag {
    position: absolute;
    bottom: 64px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    animation: rise 0.6s ease forwards 1.6s;
    white-space: nowrap;
  }

  main {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }
  main h1 { font-size: clamp(32px, 6vw, 56px); margin: 0 0 16px; letter-spacing: -0.01em; }
  main p { color: var(--muted); max-width: 480px; font-size: 16px; line-height: 1.6; }
  .replay {
    margin-top: 32px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--ink);
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 14px;
    cursor: pointer;
  }
  .replay:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>

      const splash = document.getElementById('splash');
      splash.classList.add('leaving');
      splash.addEventListener('transitionend', () => splash.remove(), { once: true });
    }, SPLASH_HOLD_MS);
  });
</script>
</body>
</html>
